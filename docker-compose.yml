version: '3.4'
services:
  lm-calibr-workspace:
    privileged: true
    build:
      context: .
    image: lm-calibr-workspace
    environment:
      - DISPLAY=:1.0
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ${PWD}:/root/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /dev:/dev
    command: tail -f /dev/null
    network_mode: "host"